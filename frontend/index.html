<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KoderEduAI</title>
    <style>
      /* Loading screen while detecting subdomain */
      #subdomain-loader {
        display: none;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #f9fafb;
        color: #374151;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      .loader-content {
        text-align: center;
      }
      .spinner {
        border: 4px solid rgba(59, 130, 246, 0.2);
        border-top: 4px solid #2563eb;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="subdomain-loader">
      <div class="loader-content">
        <div class="spinner"></div>
        <p>Loading KoderEduAI...</p>
      </div>
    </div>
    <div id="root"></div>
    
    <script type="module">
      // Detect subdomain and load appropriate app
      (function() {
        const hostname = window.location.hostname;
        const parts = hostname.split('.');
        
        let appToLoad = 'portal'; // default to portal for simplicity
        let detectedSubdomain = null;
        
        // Determine which app to load based on subdomain
        if (hostname === 'portal.kodereduai.pk') {
          // Portal subdomain -> Admin Portal
          appToLoad = 'portal';
        } else if (hostname.endsWith('.kodereduai.pk') && parts.length === 3 && parts[0] !== 'www') {
          // School subdomain (e.g., focus.kodereduai.pk, focus2.kodereduai.pk)
          appToLoad = 'school';
          detectedSubdomain = parts[0];
        } else if (hostname === 'localhost' || hostname.startsWith('127.0.0.1')) {
          // Development mode - check URL params first, then localStorage
          const params = new URLSearchParams(window.location.search);
          let subdomainParam = params.get('subdomain');
          
          // Validate subdomain - should not contain slashes or special chars
          if (subdomainParam && subdomainParam.includes('/')) {
            console.warn('⚠️ Invalid subdomain detected (contains slash):', subdomainParam);
            subdomainParam = subdomainParam.split('/')[0]; // Take only the first part
          }
          
          if (subdomainParam === 'portal') {
            appToLoad = 'portal';
            localStorage.removeItem('dev_subdomain'); // Clear school subdomain
          } else if (subdomainParam) {
            appToLoad = 'school';
            detectedSubdomain = subdomainParam;
            localStorage.setItem('dev_subdomain', subdomainParam); // Persist for navigation
          } else {
            // No URL param - check localStorage for previously set subdomain
            const savedSubdomain = localStorage.getItem('dev_subdomain');
            
            // Validate saved subdomain
            const validSubdomain = savedSubdomain && !savedSubdomain.includes('/') ? savedSubdomain : null;
            
            if (validSubdomain && validSubdomain !== 'portal') {
              appToLoad = 'school';
              detectedSubdomain = validSubdomain;
              // Add subdomain back to URL for clarity
              const newUrl = new URL(window.location.href);
              newUrl.searchParams.set('subdomain', validSubdomain);
              window.history.replaceState({}, '', newUrl);
            } else {
              appToLoad = 'portal'; // Default to portal for local dev
            }
          }
        }
        
        console.log('🎯 Detected app to load:', appToLoad, 'for hostname:', hostname, detectedSubdomain ? `(subdomain: ${detectedSubdomain})` : '');
        
        // Remove loader and load the appropriate app entry point
        const loader = document.getElementById('subdomain-loader');
        
        // Dynamically import the correct app
        if (appToLoad === 'portal') {
          import('/src/apps/portal/main.jsx').then(() => {
            if (window.__subdomainLoaderTimer) {
              window.clearTimeout(window.__subdomainLoaderTimer);
            }
            if (loader) loader.style.display = 'none';
          }).catch(err => {
            console.error('Failed to load portal app:', err);
            if (window.__subdomainLoaderTimer) {
              window.clearTimeout(window.__subdomainLoaderTimer);
            }
            if (loader) loader.style.display = 'flex';
            loader.innerHTML = '<div class="loader-content"><p>⚠️ Failed to load portal</p></div>';
          });
        } else if (appToLoad === 'school') {
          import('/src/apps/school/main.jsx').then(() => {
            if (window.__subdomainLoaderTimer) {
              window.clearTimeout(window.__subdomainLoaderTimer);
            }
            if (loader) loader.style.display = 'none';
          }).catch(err => {
            console.error('Failed to load school app:', err);
            if (window.__subdomainLoaderTimer) {
              window.clearTimeout(window.__subdomainLoaderTimer);
            }
            if (loader) loader.style.display = 'flex';
            loader.innerHTML = '<div class="loader-content"><p>⚠️ Failed to load school portal</p></div>';
          });
        }
      })();
    </script>
    <script>
      // Avoid flash-of-loader: only show bootstrap loader if startup is noticeably slow.
      (function() {
        const loader = document.getElementById('subdomain-loader')
        if (!loader) return
        window.__subdomainLoaderTimer = window.setTimeout(() => {
          loader.style.display = 'flex'
        }, 700)
      })();
    </script>
  </body>
</html>
